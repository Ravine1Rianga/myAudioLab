<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Player</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 460px;
      margin: 60px auto;
      padding: 0 20px;
      background: #f5f5f5;
      color: #222;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 1.2rem;
    }

    .card {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 24px;
    }

    #loaderZone {
      border: 1px dashed #aaa;
      border-radius: 4px;
      padding: 14px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: #555;
    }
    #loaderZone:hover { background: #f0f0f0; }
    #loaderZone.has-file { border-color: #555; color: #222; }
    #fileInput { display: none; }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 4px;
    }

    #seekBar {
      width: 100%;
      cursor: pointer;
      margin-bottom: 16px;
      display: block;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: center;
    }

    button {
      font-family: Arial, sans-serif;
      font-size: 0.8rem;
      padding: 6px 14px;
      border: 1px solid #aaa;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #e8e8e8; }
    button.active { background: #ddd; border-color: #555; font-weight: bold; }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    label { font-size: 0.8rem; color: #444; width: 50px; }

    input[type="range"] { flex: 1; cursor: pointer; }

    select {
      font-size: 0.8rem;
      padding: 4px 6px;
      border: 1px solid #aaa;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }

    #statusText {
      font-size: 0.75rem;
      color: #777;
      margin-top: 14px;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }

    .shortcuts {
      font-size: 0.7rem;
      color: #aaa;
      margin-top: 8px;
    }
    .shortcuts span { margin-right: 10px; }
  </style>
</head>
<body>

<h2>Audio Player</h2>

<div class="card">

  <div id="loaderZone">
    Click or drop an audio file (MP3, WAV, OGG…)<br>
    <small id="loaderFilename">Default: audio.mp3</small>
  </div>
  <input type="file" id="fileInput" accept="audio/*" />

  <audio id="audioEl" src="audio.mp3" preload="metadata"></audio>

  <div class="time-row">
    <span id="currentTime">0:00</span>
    <span id="duration">0:00</span>
  </div>
  <input type="range" id="seekBar" min="0" max="100" value="0" step="0.1" />

  <div class="controls">
    <button id="skipBackBtn">« 10s</button>
    <button id="playBtn">▶ Play</button>
    <button id="skipFwdBtn">10s »</button>
    <button id="muteBtn">Mute</button>
    <button id="loopBtn">Loop</button>
  </div>

  <div class="row">
    <label for="volumeSlider">Volume</label>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" />
    <span id="volumeVal" style="font-size:0.8rem;width:34px">100%</span>
  </div>

  <div class="row">
    <label for="speedSelect">Speed</label>
    <select id="speedSelect">
      <option value="0.5">0.5×</option>
      <option value="0.75">0.75×</option>
      <option value="1" selected>1×</option>
      <option value="1.25">1.25×</option>
      <option value="1.5">1.5×</option>
      <option value="2">2×</option>
    </select>
  </div>

  <div id="statusText">Status: Ready</div>

  <div class="shortcuts">
    <span>Space: play/pause</span>
    <span>M: mute</span>
    <span>L: loop</span>
    <span>←/→: skip 10s</span>
    <span>↑/↓: volume</span>
  </div>

</div>

<script src="audio.js"></script>
</body>
</html>
